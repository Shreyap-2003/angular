<div class="order-detail-page" *ngIf="order">

  <button class="back-btn" (click)="goBack()">← Back</button>

  <div class="detail-card">

    <!-- Invoice Button -->
    <button 
      class="invoice-btn"
      *ngIf="order.orderStatus === 'COMPLETED'"
      (click)="downloadInvoice()">
      ⬇ Download Invoice
    </button>


    <img [src]="order.imageUrl" class="detail-img" />

    <div class="detail-body">

      <h2 class="detail-name">{{ order.itemName }}</h2>

      <p class="detail-price">
        ₹ {{ order.price }}
      </p>


      <div class="detail-row">
        <span class="detail-label">Order ID</span>
        <span class="detail-value">#{{ order.id }}</span>
      </div>


      <div class="detail-row">
        <span class="detail-label">Ordered On</span>
        <span class="detail-value">
          {{ order.createdTime | date:'dd MMM yyyy, hh:mm a' }}
        </span>
      </div>


      <div class="detail-row">
        <span class="detail-label">Status</span>

        <span class="detail-value"
          [ngClass]="order.orderStatus === 'COMPLETED' 
          ? 'tag completed' 
          : (order.partnerId ? 'tag assigned' : 'tag progress')">

          {{ order.orderStatus === 'COMPLETED'
          ? 'Completed'
          : (order.partnerId ? 'Assigned' : 'In Progress') }}

        </span>
      </div>


      <div class="detail-row" *ngIf="order.partnerPhone">
        <span class="detail-label">Delivery Partner</span>
        <span class="detail-value">
          {{ order.partnerPhone }}
        </span>
      </div>


    </div>

  </div>

</div>
