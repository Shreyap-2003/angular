<h1 class="items-title" align="center">
  {{ subcategoryName }}
</h1>

<div class="items-container">

  <div
    class="item-card"
    *ngFor="let item of items"
  >

    <img
      [src]="item.imageUrl"
      alt="item image"
      class="item-image"
    />

    <h3 class="item-name">
      {{ item.name }}
    </h3>

    <h4 class="item-price">
      ₹ {{ item.price }}
    </h4>

    <!-- ADD BUTTON -->

    <button
      *ngIf="!item.quantity || item.quantity === 0"
      class="add-btn"
      (click)="addItem(item)"
    >
      ADD
    </button>

    <!-- QUANTITY CONTROLS -->

    <div
      class="quantity-container"
      *ngIf="(item.quantity ?? 0) > 0"
    >

      <button
        class="qty-btn"
        (click)="decreaseQuantity(item)"
      >
        -
      </button>

      <span class="quantity">
        {{ item.quantity }}
      </span>

      <button
        class="qty-btn"
        (click)="increaseQuantity(item)"
      >
        +
      </button>

    </div>

  </div>

</div>

<!-- BOTTOM BAR -->

<div class="bottom-bar" *ngIf="cartCount > 0">

  <div class="bottom-left">
    {{ cartCount }} items added
  </div>

  <div class="bottom-center">
    Total: ₹ {{ totalAmount }}
  </div>

  <div class="bottom-right">

    <button
      class="home-btn"
      (click)="goToCart()"
    >
      View cart →
    </button>

  </div>

</div>
